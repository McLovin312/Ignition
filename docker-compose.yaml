x-ignition-env: &ignition-env
  ACCEPT_IGNITION_EULA: Y
  TZ: America/Los_Angeles
  GATEWAY_ADMIN_USERNAME: ad
  GATEWAY_ADMIN_PASSWORD: p

x-ignition-service: &ignition-service
  restart: unless-stopped
  networks:
    - ignition-net
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8088/status.ping || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 45s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  GW1:
    <<: *ignition-service
    image: inductiveautomation/ignition:8.3.1
    ports:
      - "9083:8088"
      - "9084:8060"
    environment:
      <<: *ignition-env
      IGNITION_EDITION: standard
    command: ["-n", "gw83-standard", "-m", "60000"]
    volumes:
      - ./gw1-data:/usr/local/ignition/data

  GW2:
    <<: *ignition-service
    image: inductiveautomation/ignition:8.3.1
    ports:
      - "9085:8088"
      - "9086:8060"
    environment:
      <<: *ignition-env
      IGNITION_EDITION: standard
    command: ["-n", "gw83-standard2", "-m", "20000"]
    volumes:
      - gw2-data:/usr/local/ignition/data

  GW3:
    <<: *ignition-service
    image: inductiveautomation/ignition:8.1.35
    ports:
      - "9087:8088"
      - "9088:8060"
    environment:
      <<: *ignition-env
      IGNITION_EDITION: standard
    command: ["-n", "gw8150-standard", "-m", "50000"]
    volumes:
      - gw3-data:/usr/local/ignition/data

  GW4:
    <<: *ignition-service
    image: inductiveautomation/ignition:8.1.50
    ports:
      - "9089:8088"
      - "9090:8060"
    environment:
      <<: *ignition-env
      IGNITION_EDITION: edge
    command: ["-n", "gw8150-edge", "-m", "20000"]
    volumes:
      - gw4-data:/usr/local/ignition/data

  GW5:
    <<: *ignition-service
    image: kcollins/ignition:7.9.21
    ports:
      - "9091:8088"
      - "9092:8060"
    environment:
      <<: *ignition-env
      IGNITION_EDITION: standard
    command: ["-n", "gw7921-standard", "-m", "20000"]
    volumes:
      - gw5-data:/usr/local/ignition/data

volumes:
  gw1-data:
  gw2-data:
  gw3-data:
  gw4-data:
  gw5-data:

networks:
  ignition-net:
    driver: bridge
